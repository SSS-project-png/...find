<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>...</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Alinea los reproductores uno abajo del otro */
            justify-content: center;
            align-items: center;
            gap: 20px; /* Separa los reproductores de forma ordenada */
            user-select: none;
        }
        audio {
            filter: invert(1); /* Estilo blanco y negro */
        }
    </style>
</head>
<body>

    <audio controls controlsList="nodownload">
        <source src="audio.wav" type="audio/wav">
        Tu navegador no soporta este elemento de audio.
    </audio>

    <audio controls controlsList="nodownload">
        <source src="pista.mp3" type="audio/mpeg">
        Tu navegador no soporta este elemento de audio.
    </audio>

</body>
</html>
