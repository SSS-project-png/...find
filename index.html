<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>...</title>
    <style>
        /* Esto hace que todo el fondo sea negro y no se pueda seleccionar nada */
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        /* Estilo básico para el reproductor en el centro */
        audio {
            filter: invert(1); /* Esto vuelve el reproductor blanco/gris para que resalte en el negro */
        }
    </style>
</head>
<body>

    <!-- Aquí va el reproductor en todo el centro de la pantalla -->

<audio controls controlsList="nodownload">
        <source src="audio.wav" type="audio/wav">
        Tu navegador no soporta este elemento de audio.
    </audio>

<br><br>

<audio controls controlsList="nodownload">
        <source src="Pista ♪.mp3" type="audio/mpeg">
        Tu navegador no soporta este elemento de audio.
    </audio>

</body>
</html>
